# Set sleep timeout to 30min (30*60*1000ms)
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Enable mouse
CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y


# Don't show layer status
#CONFIG_CUSTOM_WIDGET_BATTERY_STATUS=n
#CONFIG_CUSTOM_WIDGET_LAYER_STATUS=n

# Bluetooth tweaks (unnecessary unless you address specific problems, and experimental i.e. can cause issues)
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enables RGB functionality (Uncomment lines below to enable.)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# USB logging
# This gives you 8 seconds to connect before logs start, so you don't miss boot messages.
#  ls /dev | grep tty.usbmodem
#  sudo cu -l /dev/tty.usbmodem14501
# CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000