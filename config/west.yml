manifest:
  defaults:
    remote: urob
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
    - name: urob
      url-base: https://github.com/urob
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: 0331b7d16e80954b807917f9323e59ffc1e3b626 # main (4/19/2026)
      import: app/west.yml
    # ZMK modules
    - name: zmk-unicode
      path: modules/zmk/unicode
      revision: 0331b7d16e80954b807917f9323e59ffc1e3b626 # set to same as ZMK version above
  self:
    path: config
